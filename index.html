<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STOK</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:rgba(15,23,42,.08);
  --accent:#6366f1;
  --good:#16a34a;
  --radius:16px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:sticky;top:0;
  background:rgba(246,247,251,.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:14px 20px;
  gap:16px;
}

.brand{
  font-weight:700;
  letter-spacing:-.03em;
}

.filters{
  display:flex;
  gap:8px;
  overflow:auto;
  flex:1;
}

.pill{
  border:1px solid var(--line);
  background:white;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  color:var(--muted);
  transition:.2s;
  white-space:nowrap;
}
.pill.active{
  background:var(--text);
  color:white;
}

.search{
  border:1px solid var(--line);
  padding:8px 12px;
  border-radius:999px;
  width:180px;
  outline:none;
}

/* HERO */
.hero{
  padding:40px 20px 20px;
}
.hero h1{
  font-size:34px;
  line-height:1.1;
}
.hero span{
  color:var(--accent);
}

/* GRID */
.wrap{
  padding:10px 20px 60px;
}

.section{
  margin-top:30px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.section-title{
  font-weight:600;
}

.count{
  font-size:12px;
  color:var(--muted);
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.brand{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
}

.name{
  font-weight:600;
  margin-top:6px;
  font-size:14px;
}

.badge{
  margin-top:12px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--good);
  background:#ecfdf5;
  padding:4px 8px;
  border-radius:999px;
}

/* EMPTY */
.empty{
  display:none;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}
</style>
</head>

<body>

<nav>
  <div class="brand">STOK</div>

  <div class="filters" id="filters">
    <button class="pill active" data-brand="all">All</button>
  </div>

  <input class="search" id="search" placeholder="Search..."/>
</nav>

<div class="hero">
  <h1>Rawezh <span>Mobile</span></h1>
</div>

<div class="wrap" id="wrap"></div>

<div class="empty" id="empty">
  <i class="ti ti-search-off" style="font-size:28px"></i>
  <p>No products found</p>
</div>
<footer style="text-align:center;padding:20px;color:var(--muted);font-size:12px">
  Made by Miran Osman<br/>
  copyright &copy; 2026
</footer>

<script>
const supa = supabase.createClient(
  "https://tidlwmprwuursacrxeqn.supabase.co",
  "sb_publishable_X9Ur5rZE14CtdyorPQtO0A_rlfh5p0U"
);

let data = [];
let brand = "all";
let q = "";

async function load(){
  const res = await supa.from("products")
    .select("*")
    .eq("available", true)
    .order("brand");

  data = res.data || [];
  buildFilters();
  render();
}

function buildFilters(){
  const brands = [...new Set(data.map(d=>d.brand))];
  const el = document.getElementById("filters");

  el.innerHTML = `<button class="pill active" data-brand="all">All</button>` +
    brands.map(b=>`<button class="pill" data-brand="${b}">${b}</button>`).join("");

  el.onclick = (e)=>{
    if(!e.target.dataset.brand) return;
    brand = e.target.dataset.brand;

    document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
    e.target.classList.add("active");

    render();
  }
}

function render(){
  const filtered = data.filter(p=>{
    const okB = brand==="all" || p.brand===brand;
    const okQ = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
    return okB && okQ;
  });

  const wrap = document.getElementById("wrap");
  const empty = document.getElementById("empty");

  if(filtered.length===0){
    wrap.innerHTML="";
    empty.style.display="block";
    return;
  }

  empty.style.display="none";

  const grouped = {};
  filtered.forEach(p=>{
    grouped[p.brand] = grouped[p.brand] || [];
    grouped[p.brand].push(p);
  });

  wrap.innerHTML = Object.entries(grouped).map(([b,items])=>`
    <div class="section">
      <div class="section-header">
        <div class="section-title">${b}</div>
        <div class="count">${items.length} items</div>
      </div>

      <div class="grid">
        ${items.map(i=>`
          <div class="card">
            <div class="brand">${i.brand}</div>
            <div class="name">${i.name}</div>
            <div class="badge"><span>●</span> In stock</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

document.getElementById("search").oninput=(e)=>{
  q = e.target.value.toLowerCase();
  render();
}

load();
</script>

</body>
</html>
